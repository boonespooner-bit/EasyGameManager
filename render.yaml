databases:
  - name: easy-game-manager-db
    plan: free
    databaseName: easy_game_manager
    user: egm

services:
  - type: web
    name: easy-game-manager
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: easy-game-manager-db
          property: connectionString
      - key: NEXTAUTH_URL
        value: "https://easy-game-manager.onrender.com"
      - key: NEXTAUTH_SECRET
        generateValue: true
