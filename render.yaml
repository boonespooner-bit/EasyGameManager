services:
  - type: web
    name: easy-game-manager
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
      - key: HOSTNAME
        value: "0.0.0.0"
